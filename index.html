<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拾光报社</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #ffffff;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 26px;
            color: #222;
        }

        .nav {
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            padding: 10px 22px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fff;
            font-size: 15px;
            cursor: pointer;
        }

        .btn:hover {
            background: #f7f7f7;
        }

        .img-container {
            position: relative;
            margin: 30px auto;
            max-width: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #newsImg {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .zoom-panel {
            position: fixed;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(255,255,255,0.9);
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
            z-index: 999;
        }

        .zoom-btn {
            width: 42px;
            height: 42px;
            font-size: 18px;
            border: none;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
        }

        .page {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
    </style>
</head>

<body>
    <h1>拾光报社</h1>

    <div class="nav" id="paperList"></div>

    <div class="img-container">
        <img id="newsImg" alt="报纸内容">
    </div>

    <div class="page">
        <button class="btn" onclick="prevPage()">上一页</button>
        <button class="btn" onclick="nextPage()">下一页</button>
    </div>

    <div class="zoom-panel">
        <button class="zoom-btn" onclick="zoomIn()">➕</button>
        <button class="zoom-btn" onclick="zoomOut()">➖</button>
        <button class="zoom-btn" onclick="resetZoom()">⟲</button>
    </div>

    <script>
        const MAX_ISSUE = 10;
        const MAX_PAGE = 10;
        let currentPaper = "Pho1";
        let currentPage = 1;
        let scale = 1;

        const list = document.getElementById("paperList");
        for (let i = 1; i <= MAX_ISSUE; i++) {
            let btn = document.createElement("button");
            btn.className = "btn";
            btn.innerText = `第${i}期`;
            btn.onclick = () => {
                currentPaper = `Pho${i}`;
                currentPage = 1;
                scale = 1;
                updateImg();
            };
            list.appendChild(btn);
        }

        function updateImg() {
            const img = document.getElementById("newsImg");
            img.src = `${currentPaper}/${currentPage}.jpg`;
            img.style.transform = `scale(${scale})`;
        }

        function nextPage() {
            if (currentPage < MAX_PAGE) {
                currentPage++;
                updateImg();
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                updateImg();
            }
        }

        function zoomIn() {
            scale += 0.2;
            updateImg();
        }

        function zoomOut() {
            if (scale > 0.4) scale -= 0.2;
            updateImg();
        }

        function resetZoom() {
            scale = 1;
            updateImg();
        }

        updateImg();
    </script>
</body>
</html>
